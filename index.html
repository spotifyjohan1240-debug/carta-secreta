<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #E76473, #F59BA5);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .screen {
            display: none;
            width: 100%;
            justify-content: center;
            align-items: center;
        }

        .active {
            display: flex;
        }

        .password-box {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .12);
            text-align: center;
            width: 100%;
            max-width: 350px;
        }

        .password-box h2 {
            margin-bottom: 20px;
            color: #d63384;
        }

        .input-display {
            font-size: 30px;
            letter-spacing: 10px;
            margin-bottom: 20px;
            min-height: 40px;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .key {
            padding: 18px;
            border: none;
            border-radius: 15px;
            background: #ffd6e7;
            font-size: 20px;
            cursor: pointer;
            transition: .2s;
        }

        .key:hover {
            background: #ffb3d1;
        }

        .special {
            background: #ff8fb1;
            color: white;
        }

        .notepad {
            background: white;
            width: 100%;
            max-width: 650px;
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .12);
            animation: fadeIn .6s ease;
        }

        .notepad h3 {
            color: #d63384;
            margin-bottom: 10px;
        }

        .notepad h4 {
            margin-bottom: 20px;
            color: #444;
        }

        .notepad p {
            line-height: 1.8;
            margin-bottom: 15px;
            color: #333;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

                <button class="key" onclick="enterDigit('8')">8</button>
                <button class="key" onclick="enterDigit('9')">9</button>
                <button class="key special" onclick="clearInput()">⌫</button>
                <button class="key" onclick="enterDigit('0')">0</button>
                <button class="key special" onclick="submitPassword()">✓</button>
            </div>
        </div>
    </div>

            "6985": {

    text: `

        <p>Y entonces aparece la pregunta que no deja de perseguirme: ¿cómo se encuentra en otra persona algo que parece haber sido creado únicamente para existir dentro de ti?</p>

         <audio controls style="width:100%; margin-top:20px;">

        <p>I can’t ask you, much less demand, that you choose me. And honestly, I wouldn’t want to. Because if one day you decide to stay, I want it to be because your heart truly wanted to, not because someone pushed you into it.</p>

        <p>I’m not going to compare myself to the people from your past, even if there are things I struggle to understand. I will never understand how someone can say “I love you” while knowingly causing pain. But I also refuse to turn this into a competition between them and me, because you are not a trophy, nor some prize waiting at the end of a race.</p>

        <p>You are an incredible woman. Intelligent, genuine, beautiful, with a way of thinking that completely disarms me and a personality impossible to ignore. There’s a light in you that’s hard to find, a presence that changes the atmosphere without even trying, and a way of existing that leaves marks on people without you even realizing it.</p>

        <p>And that’s exactly why I will never beg you to stay. Because someone like you deserves the freedom to choose what she wants for her life, even if that decision doesn’t include me.</p>

        <p>I also don’t want to sell myself to you like I’m some product trying to convince you why I should be chosen. That would be ridiculous. First, because love doesn’t work that way. And second, because if I’m being completely honest, I don’t have a perfect life to offer you. My life is full of chaos, problems, insecurities, and broken pieces that I’m still trying to rebuild while other parts keep falling apart faster than I can fix them.</p>

        <p>And yes, I’m fully aware of everything standing against us.</p>

        <p>The distance. The differences. The completely different ways we grew up, think, and see the world. There are miles between us that aren’t only measured on maps, but also in experiences, realities, and the lives we’ve lived.</p>

        <p>And even with all of that… here I am.</p>

        <p>Because despite everything, meeting you feels like a coincidence too improbable to ignore. Like out of millions of possible paths, life somehow decided to cross ours. And I don’t know if that means anything to the universe, but it means something to me.</p>

        <p>I’m not going to promise you a perfect relationship. I’m not going to tell you we’ll never argue, that you’ll never feel afraid, or that hard moments won’t exist. I’m a mess sometimes. I have flaws that will probably stay with me for years, wounds I still carry, and a complicated way of dealing with life.</p>

        <p>But I also know how to love sincerely.</p>

        <p>And when I love someone, I try to give them every part of me, even the parts I would normally hide from the rest of the world.</p>

        <p>I can’t promise forever, because the future belongs to no one. But I can promise honesty. I can promise you that I would never play with your feelings, never manipulate you into staying, and that if I ever hurt you, it would hurt me even more than losing you ever could.</p>

        <p>Because before I want you with me, I want you to be okay.</p>

        <p>That’s why I will always ask you to think about yourself first. Your happiness. Your peace. The kind of life you truly want to live. Be selfish with yourself if you need to. Choose whatever brings you peace, even if that choice means walking away from me.</p>

        <p>And even knowing that… I’m still here, opening the doors to my life, my mind, and everything I carry inside me.</p>

        <p>Not because I expect an answer right away. Not because I think I deserve you. I do it because it’s genuine. Because from the moment you came into my life, I felt something different, something I couldn’t ignore even if I wanted to.</p>

        <p>Maybe we still have a lot to learn. Maybe reality will end up being stronger than what we feel right now. But if one day you decide to take that leap with me, even if you’re scared, even without guarantees, I swear you will never walk through it alone.</p>

        <p>And maybe, just maybe, despite all the odds against us, we could become one of those impossible stories that somehow still found a way to exist.</p>
    `
},
            "3064": {
    date: "20 Mayo 2026",
    title: "Tú y yo frente al mar",
    text: `
        <p>Te siento y pienso: ¿cuándo iremos al mar tú y yo, juntos, solos? ¿Cuándo podremos ir? ¿Podremos? ¿Será la vida lo suficientemente amable como para dejarnos llegar hasta ese instante?</p>

        <p>Porque mi mente está llena de momentos contigo que todavía no existen, pero viven dentro de mí como olas golpeando una y otra vez la orilla. Y entre todos esos pensamientos, siempre aparece el mismo: tú y yo frente al mar.</p>

        <p>No conozco la arena entre tus dedos, ni el color de tu piel bajo el sol y la crema protectora. No he escuchado contigo el rumor de las olas, ni he besado la sal en nuestros labios. No sé lo que es quedarme a tu lado mirando el horizonte en silencio, mientras el viento juega con tu pelo y el tiempo parece detenerse.</p>

        <p>No he visto el mar contigo, y aun así siento que lo extraño.</p>

        <p>Porque tal vez el mar contigo dejaría de ser solamente mar. Tal vez se volvería recuerdo, refugio, hogar. Y a veces me pregunto si algún día viviremos todo eso… o si habrá cosas tan bonitas que solo existirán en mi imaginación.</p>
    `
},
            "5412": {
    date: "21 Mayo 2026",
    title: "Ella viste de blanco",
    text: `
        <p>Tanta belleza,<br>
        tanta sutileza…<br>
        ¿De dónde sale tanta delicadeza?</p>

        <p>Y yo aquí, mirando unos simples videos, intentando entender cómo alguien puede verse así de irreal incluso a través de una pantalla.</p>

        <p>Quién te viera de cerca con ese vestido blanco.<br>
        Quién pudiera contemplar la suavidad con la que te movías, como si bailar te hiciera más ligera que el aire. Había algo en ti que parecía calma, algo tan puro que por un instante el mundo se sintió menos pesado.</p>

        <p>Más blanca que la luna parecía tu luz. Y no lo digo solo por el vestido, sino por la sensación que dejabas al verte. Como si cargaras una tranquilidad extraña que hace que uno quiera quedarse mirando un poco más.</p>

        <p>Y es raro… porque estabas lejos, al otro lado de una pantalla, y aun así sentí que me faltaba el aire por momentos.</p>

        <p>Luna, dime, ¿en qué consiste la belleza cuando toma forma humana?</p>

        <p>Porque ella viste de blanco,<br>

            "8541": {

    title: "Jodido y radiante",
    text: `

            "8645": {
    date: "23 Mayo 2026",
    title: "Me haces feliz",
    text: `
        <p>No tengo mucho que ofrecerte, y tampoco sé cómo demostrarte todo lo que siento de la manera correcta. A veces hasta siento que las palabras me quedan pequeñas para intentar explicarlo, porque por más que lo piense nunca encuentro una forma que realmente esté a la altura de lo que provocas en mí.</p>

        <p>Solo necesito que confíes. Que creas cuando te digo que, desde que llegaste, algo en mi mundo cambió. Porque lo hiciste más ligero, más bonito, incluso en esos días donde yo mismo no se cómo sostenerme. Me devolviste sonrisas que creía perdidas, de esas que nacen solas y se quedan un rato haciendo ruido en el pecho.</p>

        <p>Y quizá para alguien más eso no parezca suficiente, pero para mí tu lo eres todo. Porque sin importar lo demás, sin importar el ruido afuera o las dudas que a veces me persiguen, hay algo que tengo claro: me haces feliz de una manera que no sentía desde hace mucho tiempo.</p>

},
            "9748": {
    date: "24 Mayo 2026",
    title: "Quisiera quedarme ahí, contigo",
    text: `

        <p>Eres esa brisa fresca que llega sin avisar y aun así cambia el ambiente entero. Un regalo caído del cielo que apareció justo cuando menos lo esperaba, pero exactamente cuando más lo necesitaba.</p>

        <p>Y me gustas demasiado, más de lo que mis palabras alcanzan a explicar. De aquí hasta las nubes y todavía más lejos. Me gustan tus ojos, tu forma de hablar, incluso esos pequeños detalles que probablemente ni tú notas pero que yo termino guardando sin darme cuenta.</p>

        <p>Quiero disfrutarte lentamente, aprender cada parte de ti, quedarme en cada instante el tiempo suficiente para hacerlo eterno. Quiero saborear cada momento contigo, completo, sin prisas, como si el mundo pudiera detenerse un rato solo para nosotros.</p>

        <p>Y si pudiera, compraría todo el tiempo necesario para quedarme ahí, contigo, haciendo que ese instante jamás desaparezca de mí.</p>
    `
},
            "6324": {

            "0357": {

            "1717": {
    date: "28 Mayo 2026",
    title: "Mi cielo",
    text: `
        <p>Últimamente he estado bastante feliz,<br>
        y supongo que tú tienes mucho que ver con eso.</p>

        <p>No sé en qué momento empezaste a volver mis días más ligeros,<br>
        y, sinceramente, me gusta demasiado que sea así.</p>

        <p>A veces pienso en todo lo que tuvo que pasar para que usted y yo coincidiéramos,<br>
        en todas las casualidades absurdamente precisas que tuvieron que alinearse,<br>
        y entonces entiendo que el universo hizo demasiado esfuerzo como para que yo no intente hacerte feliz de verdad.</p>

        <p>Por eso quiero que valga la pena.<br>
        Todo.<br>
        La distancia, la espera, los nervios, las ganas de verte,<br>
        y cada pequeña cosa que nos ha traído hasta aquí.</p>

        <p>Sé que todavía no te he dado ni la mitad de lo que mereces,<br>
        pero te prometo darte todo, absolutamente todo, de lo poco que tengo.<br>
        Porque quizá no soy perfecto,<br>
        pero contigo las intenciones me nacen bonitas y sinceras.</p>

        <p>Y gracias...<br>
        gracias por la confianza,<br>
        por abrirme espacio en tu vida,<br>
        por permitirme conocerte un poquito más cada día<br>
        y también por dejar que conozcas la parte más real de mí.</p>

        <p>Solo espero que algún día mires todo esto hacia atrás<br>
        y entiendas que jamás tuve intención de jugar contigo,<br>
        porque desde el principio lo único que he querido<br>
        es hacerte sentir querida, tranquila y especial.</p>

        <p>Y créeme,<br>
        jamás vas a arrepentirte de haberme conocido, mi cielo.</p>
    `
},
            "3634": {
    date: "29 Mayo 2026",
    title: "Tú eres una de ellas",
    text: `
        <p>La vida, en estos momentos, me está dando bastante duro.<br>
        No voy a mentirte, últimamente no la he estado pasando bien conmigo mismo y hay días en los que seguir adelante me cuesta más de lo que quisiera admitir.</p>

        <p>Pero si hay algo que no ha cambiado en medio de todo este desorden, eres tú.</p>

        <p>De hecho, si soy sincero, te estoy queriendo como nunca, mi preciosa.</p>

        <p>Y tal vez no lo sepas, pero te has ido convirtiendo en una de las partes más bonitas de mis días. Cuando todo parece ir cuesta arriba, cuando mi cabeza decide hacerme las cosas más difíciles de lo necesario, apareces tú de alguna manera y consigues que el peso sea un poco más llevadero.</p>

        <p>No porque vengas a resolver mis problemas, ni porque tengas la responsabilidad de hacerlo, sino porque tu existencia en mi vida me recuerda que todavía hay cosas que valen la pena, cosas que me hacen sonreír incluso en los días más grises.</p>

        <p>Por eso te pido paciencia si a veces me notas cansado o distante.<br>
        No es falta de interés, no es que mis sentimientos hayan cambiado ni un poco.</p>

        <p>Al contrario.</p>

        <p>Aun en medio de estos días complicados, sigo teniendo las mismas ganas de conocerte más, de cuidarte, de hacerte reír y de construir algo bonito contigo.</p>

        <p>Y no dudes ni por un segundo que sigo conservando la misma intensidad, la misma ilusión y los mismos deseos de algún día poder llamarte mi mujer.</p>

        <p>Porque hay cosas que cambian con los días,<br>
        y hay otras que, mientras más tiempo pasa, más seguras se vuelven.</p>

        <p>Tú eres una de ellas.</p>
    `
},
            "2580": {
    date: "30 Mayo 2026",
    title: "Quiero compartir contigo",
    text: `
        <p>Puede que esto no sea una sorpresa para ti, pero siento que ya es hora de ponerle nombre a lo que llevo tiempo sintiendo, de dejar de insinuarlo y decirlo con todas sus letras. Porque hay sentimientos que merecen ser pronunciados, y este es uno de ellos.</p>

        <p>Quiero compartir la vida contigo.</p>

        <p>Y no me refiero únicamente a los momentos bonitos, a las conversaciones que nos hacen sonreír o a los días en los que todo parece sencillo. También hablo de los días difíciles, de esos momentos en los que el cansancio pesa, cuando los planes cambian, cuando la distancia incomoda o cuando la vida nos pone a prueba.</p>

        <p>Quiero seguir descubriéndote con el paso del tiempo, aprender tus nuevas versiones, escuchar tus pensamientos cuando nadie más los conoce y estar presente tanto en tus mejores recuerdos como en esos instantes silenciosos que terminan significando más de lo que parecen.</p>

        <p>Quiero convertirme en alguien en quien puedas apoyarte, alguien que te inspire seguridad, que celebre tus alegrías como si fueran propias y que permanezca cerca cuando necesites compañía.</p>

        <p>Quiero ser parte de tus días, de las pequeñas rutinas que construyen una vida, de las historias que todavía no hemos vivido y de los sueños que aún están esperando su momento.</p>

        <p>Quiero acompañarte cuando las cosas salgan bien y quedarme cuando no salgan como esperábamos. Quiero admirarte en tus fortalezas y cuidarte en tus momentos de fragilidad. Quiero que el tiempo nos encuentre caminando en la misma dirección.</p>

        <p>Porque mientras más te conozco, más claro tengo que no me interesa una historia pasajera ni una emoción momentánea. Lo que quiero es seguir apostando por ti, seguir eligiéndote y seguir construyendo algo contigo.</p>

        <p>Y si tengo que resumir todo lo que siento en una sola idea, sería esta: de todas las personas que podría elegir, la persona con la que quiero compartir la vida eres tú.</p>
    `
},
            "1346": {
    date: "31 Mayo 2026",
    title: "Lo especial siempre has sido tú",
    text: `
        <p>Hoy me senté a escribirte como siempre. Tomé una hoja y me encontré frente a ese mar blanco que tienen las páginas antes de recibir la primera palabra.</p>

        <p>Normalmente las frases llegan solas, pero esta vez no. Me quedé observando el papel vacío, que parecía estar haciéndome preguntas en lugar de esperar respuestas.</p>

        <p>No porque no estuviera pensando en ti. De hecho, probablemente pienso demasiado en ti. El problema fue otro. Por primera vez en mucho tiempo me pregunté si todo esto sigue siendo tan especial para ti como lo es para mí.</p>

        <p>Y supongo que la culpa la tiene una sola palabra.</p>

        <p>"Oración".</p>

        <p>No sé por qué, pero cuando la escuché, mi cabeza empezó a darle vueltas por todos lados. La asocié con algo repetitivo, con algo que se dice tantas veces que termina perdiendo fuerza, como una rutina que deja de sorprender.</p>

        <p>Sé que probablemente no era eso lo que querías decir. Estoy seguro de que no había ninguna mala intención detrás de esa palabra. Pero ya me conoces, a veces una sola frase es suficiente para quedarse rondando en mi cabeza mucho más tiempo del que debería.</p>

        <p>Porque yo no escribo esto por costumbre. No escribo porque sí. No escribo para llenar una página. Escribo porque durante el día pasan cosas que me hacen pensar en ti y necesito dejarlas en algún lugar.</p>

        <p>Como cuando veo algo gracioso y mi primer pensamiento es: "esto se lo tengo que mostrar". O cuando escucho una canción y me pregunto si te gustaría o si me dirías que tengo gustos cuestionables. O cuando imagino algo tan simple como estar sentados en una cafetería cualquiera, discutiendo sobre algo sin importancia mientras tú intentas convencerme de que tienes razón y yo finjo no estar de acuerdo solo para hacerte rabiar.</p>

        <p>Son escenas pequeñas. Ni siquiera han ocurrido. Pero aparecen en mi cabeza con una facilidad que a veces me sorprende.</p>

        <p>Y quizá por eso me preocupó tanto aquella palabra. Porque para mí estos escritos siguen siendo especiales. No por lo que dicen, sino por quién los inspira. Porque detrás de cada uno siempre has estado tú. Tus mensajes, tus ocurrencias, tu forma de aparecer en mis días incluso cuando estás a miles de kilómetros.</p>

        <p>Y si algún día esto deja de ser especial para ti, si algún día mis palabras dejan de emocionarte, de hacerte sonreír o simplemente dejan de significar algo, solo te pido una cosa: dímelo.</p>

        <p>Dímelo con la misma sinceridad con la que yo intento escribirte cada noche. No me prometas que nunca va a pasar. Solo prométeme que, si pasa, no me dejarás adivinarlo.</p>

        <p>Mientras tanto, yo voy a seguir aquí, escribiendo lo que me nazca, pensando en ti más de lo razonable y guardando todas esas pequeñas escenas que todavía espero vivir contigo algún día.</p>

        <p>Porque, al final, lo especial nunca ha sido la página. Lo especial siempre has sido tú.</p>
    `
},
            "4679": {
    date: "1 Junio 2026",
    title: "Lo bonito que es quererte",
    text: `
        <p>Lo bonito que es quererte aun sin poderte dar un abrazo.</p>

        <p>Sin poder sentarme a tu lado y olvidarme del tiempo contigo.</p>

        <p>Lo bonito que es quererte incluso cuando la distancia se interpone.</p>

        <p>Lo bonito que es descubrir que hay personas que valen la pena.</p>

            "9510": {
    date: "2 Junio 2026",
    title: "El primer mes",
    text: `
        <p>Este es el primer mes.</p>

        <p>El primer mes escribiéndote. El primer mes sentándome cada día a buscar la manera de convertir en palabras todo lo que me haces sentir. El primer mes intentando, aunque sea por un momento, hacerte entender lo mucho que me importas y lo mucho que te quiero en mi vida.</p>

        <p>También es el primer mes descubriendo lo difícil que es escribir sobre ti. Porque mientras más te conozco, más me doy cuenta de que ninguna página parece suficiente. Y creo que ni en toda una vida existirían las palabras necesarias para plasmar por completo todo lo que quisiera decirte.</p>

        <p>Ha sido el primer mes tratando de demostrarte que la distancia puede ser un obstáculo, pero nunca un impedimento. Que aunque no pueda tomarte de la mano, acompañarte a casa o sentarme contigo a tomar un café, todavía puedo encontrarte cada noche entre estas líneas y dedicarte algo que para mí tiene mucho valor: mi tiempo, mis pensamientos y mis letras.</p>

        <p>Treinta días pueden parecer poco tiempo. Sin embargo, para mí han sido treinta oportunidades de recordarte que estás presente en mi vida, treinta intentos de sacarte una sonrisa, treinta noches eligiendo escribirte antes de dormir porque, de alguna manera, ya te convertiste en parte de mis días.</p>

        <p>Y este es apenas el primer mes.</p>

        <p>El primero de muchos escritos, de muchas páginas y de muchas cosas que todavía quiero contarte.</p>

        <p>Porque si algo tengo claro después de estos treinta días, es que todavía me quedan demasiadas palabras por dedicarte.</p>
    `
},
            "3928": {
    date: "3 Junio 2026",
    title: "Los días normales contigo",
    text: `
        <p>Hoy me imaginé mostrándote una canción que me gusta.</p>

        <p>Y no la canción en sí, sino el momento.</p>

        <p>Me imaginé intentando explicarte por qué me parece tan buena, hablando más de la cuenta y tratando de convencerte de que cierta parte es increíble.</p>

        <p>Y también me imaginé a ti escuchándome, dejándome terminar para después decirme que estoy exagerando.</p>

        <p>Porque, siendo honestos, probablemente tendrías razón.</p>

        <p>Lo que más me hizo sonreír fue darme cuenta de que ya no solo pienso en verte.</p>

        <p>También pienso en todas esas pequeñas cosas que podríamos hacer juntos.</p>

        <p>Escuchar música, hablar de cualquier tema durante horas, discutir por tonterías sin importancia o reírnos de cosas que nadie más entendería.</p>

        <p>Son momentos simples, pero últimamente son los que más me gusta imaginar.</p>

        <p>Porque mientras más te conozco, más me doy cuenta de que no solo me ilusionan los grandes planes contigo.</p>

        <p>También me ilusionan esos días normales que dejan de ser normales cuando se comparten con la persona correcta.</p>

        <p>Y, por alguna razón, cada vez que imagino esos momentos, siempre apareces tú.</p>
    `
},
            "1739": {
    date: "4 Junio 2026",
    title: "Cuando llegue el momento",
    text: `
        <p>Si algún día sientes miedo de mostrarme las partes más frágiles de ti, espero que recuerdes esto. No tienes que esconderme lo que te ha dolido ni disfrazar las cicatrices para que se vean más bonitas. No quiero conocerte únicamente en tus días buenos, ni quedarme solo con la versión de ti que le muestras al mundo cuando todo está bien. También quiero conocer aquello que te cuesta explicar, las historias que todavía pesan, los recuerdos que prefieres evitar y las inseguridades que aparecen cuando nadie te está viendo.</p>

        <p>No porque quiera arreglarlas, ni porque crea que tengo la solución para algo que lleva años dentro de ti. Simplemente porque si me importas, entonces también me importa todo aquello que te convirtió en la mujer que eres hoy.</p>

        <p>Y quiero que entiendas algo: no vas a espantarme por ser humana. No voy a salir corriendo porque tengas heridas, dudas o miedos. De hecho, si algún día decides confiarme esas partes de ti, lo único que voy a hacer es escucharte. Escucharte las veces que haga falta, aunque me cuentes la misma historia una y otra vez, aunque ya conozca cada detalle de memoria. Porque hay cosas que no necesitan consejos, necesitan compañía.</p>

        <p>Así que cuando te sientas lista, cuéntame. No para invadir esos lugares sensibles, sino para aprender a cuidarlos. Porque cuando alguien es importante para ti, también lo son las cosas que le duelen.</p>

        <p>Y quizá eso es lo que más extraño me parece de estos tiempos. Que muchas personas tienen miedo de quedarse, miedo de sentir, miedo de intentarlo, como si querer de verdad se hubiera vuelto una mala idea.</p>

        <p>Por eso solo quiero pedirte una cosa: cuando llegue el momento, no seas como todos. Déjame demostrarte que todavía existen personas que no salen corriendo cuando la historia se pone difícil.</p>
    `
},
            "3719": {
    date: "5 Junio 2026",
    title: "Para ti",
    text: `

    text: `
        <p>Today it rained.</p>

        <p>And as I watch the raindrops fall, I can't help but think of you.</p>

        <p>Every drop feels like a memory from a life we haven't lived yet.</p>

            "5887": {

                document.getElementById('letterDate').textContent = "📅 " + letter.date;
                document.getElementById('letterTitle').textContent = letter.title;
