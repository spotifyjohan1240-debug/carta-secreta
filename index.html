<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta Secreta 💌</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #E76473, #F59BA5);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .screen {
            display: none;
            width: 100%;
            justify-content: center;
            align-items: center;
        }

        .active {
            display: flex;
        }

        .password-box {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .12);
            text-align: center;
            width: 100%;
            max-width: 350px;
        }

        .password-box h2 {
            margin-bottom: 20px;
            color: #d63384;
        }

        .input-display {
            font-size: 30px;
            letter-spacing: 10px;
            margin-bottom: 20px;
            min-height: 40px;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .key {
            padding: 18px;
            border: none;
            border-radius: 15px;
            background: #ffd6e7;
            font-size: 20px;
            cursor: pointer;
            transition: .2s;
        }

        .key:hover {
            background: #ffb3d1;
        }

        .special {
            background: #ff8fb1;
            color: white;
        }

        .notepad {
            background: white;
            width: 100%;
            max-width: 650px;
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .12);
            animation: fadeIn .6s ease;
        }

        .notepad h3 {
            color: #d63384;
            margin-bottom: 10px;
        }

        .notepad h4 {
            margin-bottom: 20px;
            color: #444;
        }

        .notepad p {
            line-height: 1.8;
            margin-bottom: 15px;
            color: #333;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <!-- PANTALLA CONTRASEÑA -->
    <div id="passwordScreen" class="screen active">
        <div class="password-box">
            <h2>🔒 Ingresa la contraseña del día</h2>
            <div id="inputDisplay" class="input-display">••••</div>

            <div class="keypad">
                <button class="key" onclick="enterDigit('1')">1</button>
                <button class="key" onclick="enterDigit('2')">2</button>
                <button class="key" onclick="enterDigit('3')">3</button>
                <button class="key" onclick="enterDigit('4')">4</button>
                <button class="key" onclick="enterDigit('5')">5</button>
                <button class="key" onclick="enterDigit('6')">6</button>
                <button class="key" onclick="enterDigit('7')">7</button>
                <button class="key" onclick="enterDigit('8')">8</button>
                <button class="key" onclick="enterDigit('9')">9</button>
                <button class="key special" onclick="clearInput()">⌫</button>
                <button class="key" onclick="enterDigit('0')">0</button>
                <button class="key special" onclick="submitPassword()">✓</button>
            </div>
        </div>
    </div>

    <!-- PANTALLA CARTA -->
    <div id="notepadScreen" class="screen">
        <div class="notepad">
            <h3 id="letterDate"></h3>
            <h4 id="letterTitle"></h4>
            <div id="letterContent"></div>
        </div>
    </div>

    <script>
        const messages = {
            "0110": {
        date: "2 Mayo 2026",
        title: "💌 Mi amor",
        text: `
            <p>Hoy quiero recordarte lo increíble que eres.</p>
            <p>Gracias por existir, por hacer mis días mejores y por ser esa persona que siempre logra sacarme una sonrisa.</p>
            <p>Te pienso más de lo que imaginas. ♡</p>
        `
            },

            "1001": {
                date: "2 Mayo 2026",
                title: "💌 Corazón",
                text: `
            <p>Dime cómo se supone que deje de pensarte,</p>
            <p>Si apareces en mi mente sin pedir permiso,</p>
            <p>En los momentos más simples, en los más inesperados,</p>
            <p>como si hubieras encontrado la forma de quedarte en cada rincón de mis pensamientos. ♡</p>
        `
            },

            "7359": {
                date: "4 Mayo 2026",
                title: "✨ Mi persona favorita",
                text: `
            <p>No importa cómo haya ido mi día...</p>
            <p>Hablar contigo siempre lo mejora todo.</p>
            <p>Gracias por ser mi lugar seguro.</p>
        `
            }
        };

        let input = '';

        function enterDigit(digit) {
            if (input.length < 4) {
                input += digit;
                updateDisplay();
            }
        }

        function clearInput() {
            input = input.slice(0, -1);
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('inputDisplay').textContent =
                input.padEnd(4, '•');
        }

        function submitPassword() {
            if (input.length !== 4) {
                alert("La contraseña debe tener 4 dígitos");
                return;
            }

            if (messages[input]) {
                const letter = messages[input];

                document.getElementById('letterDate').textContent = "📅 " + letter.date;
                document.getElementById('letterTitle').textContent = letter.title;
                document.getElementById('letterContent').innerHTML = letter.text;

                document.getElementById('passwordScreen').classList.remove('active');
                document.getElementById('notepadScreen').classList.add('active');
            } else {
                alert("Contraseña incorrecta 💔");
                input = '';
                updateDisplay();
            }
        }
    </script>

</body>

</html>
