<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #E76473, #F59BA5);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .screen {
            display: none;
            width: 100%;
            justify-content: center;
            align-items: center;
        }

        .active {
            display: flex;
        }

        .password-box {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .12);
            text-align: center;
            width: 100%;
            max-width: 350px;
        }

        .password-box h2 {
            margin-bottom: 20px;
            color: #d63384;
        }

        .input-display {
            font-size: 30px;
            letter-spacing: 10px;
            margin-bottom: 20px;
            min-height: 40px;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .key {
            padding: 18px;
            border: none;
            border-radius: 15px;
            background: #ffd6e7;
            font-size: 20px;
            cursor: pointer;
            transition: .2s;
        }

        .key:hover {
            background: #ffb3d1;
        }

        .special {
            background: #ff8fb1;
            color: white;
        }

        .notepad {
            background: white;
            width: 100%;
            max-width: 650px;
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .12);
            animation: fadeIn .6s ease;
        }

        .notepad h3 {
            color: #d63384;
            margin-bottom: 10px;
        }

        .notepad h4 {
            margin-bottom: 20px;
            color: #444;
        }

        .notepad p {
            line-height: 1.8;
            margin-bottom: 15px;
            color: #333;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

                <button class="key" onclick="enterDigit('8')">8</button>
                <button class="key" onclick="enterDigit('9')">9</button>
                <button class="key special" onclick="clearInput()">⌫</button>
                <button class="key" onclick="enterDigit('0')">0</button>
                <button class="key special" onclick="submitPassword()">✓</button>
            </div>
        </div>
    </div>

            "6985": {

    text: `

        <p>Y entonces aparece la pregunta que no deja de perseguirme: ¿cómo se encuentra en otra persona algo que parece haber sido creado únicamente para existir dentro de ti?</p>

         <audio controls style="width:100%; margin-top:20px;">

        <p>I can’t ask you, much less demand, that you choose me. And honestly, I wouldn’t want to. Because if one day you decide to stay, I want it to be because your heart truly wanted to, not because someone pushed you into it.</p>

        <p>I’m not going to compare myself to the people from your past, even if there are things I struggle to understand. I will never understand how someone can say “I love you” while knowingly causing pain. But I also refuse to turn this into a competition between them and me, because you are not a trophy, nor some prize waiting at the end of a race.</p>

        <p>You are an incredible woman. Intelligent, genuine, beautiful, with a way of thinking that completely disarms me and a personality impossible to ignore. There’s a light in you that’s hard to find, a presence that changes the atmosphere without even trying, and a way of existing that leaves marks on people without you even realizing it.</p>

        <p>And that’s exactly why I will never beg you to stay. Because someone like you deserves the freedom to choose what she wants for her life, even if that decision doesn’t include me.</p>

        <p>I also don’t want to sell myself to you like I’m some product trying to convince you why I should be chosen. That would be ridiculous. First, because love doesn’t work that way. And second, because if I’m being completely honest, I don’t have a perfect life to offer you. My life is full of chaos, problems, insecurities, and broken pieces that I’m still trying to rebuild while other parts keep falling apart faster than I can fix them.</p>

        <p>And yes, I’m fully aware of everything standing against us.</p>

        <p>The distance. The differences. The completely different ways we grew up, think, and see the world. There are miles between us that aren’t only measured on maps, but also in experiences, realities, and the lives we’ve lived.</p>

        <p>And even with all of that… here I am.</p>

        <p>Because despite everything, meeting you feels like a coincidence too improbable to ignore. Like out of millions of possible paths, life somehow decided to cross ours. And I don’t know if that means anything to the universe, but it means something to me.</p>

        <p>I’m not going to promise you a perfect relationship. I’m not going to tell you we’ll never argue, that you’ll never feel afraid, or that hard moments won’t exist. I’m a mess sometimes. I have flaws that will probably stay with me for years, wounds I still carry, and a complicated way of dealing with life.</p>

        <p>But I also know how to love sincerely.</p>

        <p>And when I love someone, I try to give them every part of me, even the parts I would normally hide from the rest of the world.</p>

        <p>I can’t promise forever, because the future belongs to no one. But I can promise honesty. I can promise you that I would never play with your feelings, never manipulate you into staying, and that if I ever hurt you, it would hurt me even more than losing you ever could.</p>

        <p>Because before I want you with me, I want you to be okay.</p>

        <p>That’s why I will always ask you to think about yourself first. Your happiness. Your peace. The kind of life you truly want to live. Be selfish with yourself if you need to. Choose whatever brings you peace, even if that choice means walking away from me.</p>

        <p>And even knowing that… I’m still here, opening the doors to my life, my mind, and everything I carry inside me.</p>

        <p>Not because I expect an answer right away. Not because I think I deserve you. I do it because it’s genuine. Because from the moment you came into my life, I felt something different, something I couldn’t ignore even if I wanted to.</p>

        <p>Maybe we still have a lot to learn. Maybe reality will end up being stronger than what we feel right now. But if one day you decide to take that leap with me, even if you’re scared, even without guarantees, I swear you will never walk through it alone.</p>

        <p>And maybe, just maybe, despite all the odds against us, we could become one of those impossible stories that somehow still found a way to exist.</p>
    `
},
            "3064": {
    date: "20 Mayo 2026",
    title: "Tú y yo frente al mar",
    text: `
        <p>Te siento y pienso: ¿cuándo iremos al mar tú y yo, juntos, solos? ¿Cuándo podremos ir? ¿Podremos? ¿Será la vida lo suficientemente amable como para dejarnos llegar hasta ese instante?</p>

        <p>Porque mi mente está llena de momentos contigo que todavía no existen, pero viven dentro de mí como olas golpeando una y otra vez la orilla. Y entre todos esos pensamientos, siempre aparece el mismo: tú y yo frente al mar.</p>

        <p>No conozco la arena entre tus dedos, ni el color de tu piel bajo el sol y la crema protectora. No he escuchado contigo el rumor de las olas, ni he besado la sal en nuestros labios. No sé lo que es quedarme a tu lado mirando el horizonte en silencio, mientras el viento juega con tu pelo y el tiempo parece detenerse.</p>

        <p>No he visto el mar contigo, y aun así siento que lo extraño.</p>

        <p>Porque tal vez el mar contigo dejaría de ser solamente mar. Tal vez se volvería recuerdo, refugio, hogar. Y a veces me pregunto si algún día viviremos todo eso… o si habrá cosas tan bonitas que solo existirán en mi imaginación.</p>
    `
},
            "5412": {
    date: "21 Mayo 2026",
    title: "Ella viste de blanco",
    text: `
        <p>Tanta belleza,<br>
        tanta sutileza…<br>
        ¿De dónde sale tanta delicadeza?</p>

        <p>Y yo aquí, mirando unos simples videos, intentando entender cómo alguien puede verse así de irreal incluso a través de una pantalla.</p>

        <p>Quién te viera de cerca con ese vestido blanco.<br>
        Quién pudiera contemplar la suavidad con la que te movías, como si bailar te hiciera más ligera que el aire. Había algo en ti que parecía calma, algo tan puro que por un instante el mundo se sintió menos pesado.</p>

        <p>Más blanca que la luna parecía tu luz. Y no lo digo solo por el vestido, sino por la sensación que dejabas al verte. Como si cargaras una tranquilidad extraña que hace que uno quiera quedarse mirando un poco más.</p>

        <p>Y es raro… porque estabas lejos, al otro lado de una pantalla, y aun así sentí que me faltaba el aire por momentos.</p>

        <p>Luna, dime, ¿en qué consiste la belleza cuando toma forma humana?</p>

        <p>Porque ella viste de blanco,<br>

            "8541": {

    title: "Jodido y radiante",
    text: `

            "8645": {
    date: "23 Mayo 2026",
    title: "Me haces feliz",
    text: `
        <p>No tengo mucho que ofrecerte, y tampoco sé cómo demostrarte todo lo que siento de la manera correcta. A veces hasta siento que las palabras me quedan pequeñas para intentar explicarlo, porque por más que lo piense nunca encuentro una forma que realmente esté a la altura de lo que provocas en mí.</p>

        <p>Solo necesito que confíes. Que creas cuando te digo que, desde que llegaste, algo en mi mundo cambió. Porque lo hiciste más ligero, más bonito, incluso en esos días donde yo mismo no se cómo sostenerme. Me devolviste sonrisas que creía perdidas, de esas que nacen solas y se quedan un rato haciendo ruido en el pecho.</p>

        <p>Y quizá para alguien más eso no parezca suficiente, pero para mí tu lo eres todo. Porque sin importar lo demás, sin importar el ruido afuera o las dudas que a veces me persiguen, hay algo que tengo claro: me haces feliz de una manera que no sentía desde hace mucho tiempo.</p>

},
            "9748": {
    date: "24 Mayo 2026",
    title: "Quisiera quedarme ahí, contigo",
    text: `

        <p>Eres esa brisa fresca que llega sin avisar y aun así cambia el ambiente entero. Un regalo caído del cielo que apareció justo cuando menos lo esperaba, pero exactamente cuando más lo necesitaba.</p>

        <p>Y me gustas demasiado, más de lo que mis palabras alcanzan a explicar. De aquí hasta las nubes y todavía más lejos. Me gustan tus ojos, tu forma de hablar, incluso esos pequeños detalles que probablemente ni tú notas pero que yo termino guardando sin darme cuenta.</p>

        <p>Quiero disfrutarte lentamente, aprender cada parte de ti, quedarme en cada instante el tiempo suficiente para hacerlo eterno. Quiero saborear cada momento contigo, completo, sin prisas, como si el mundo pudiera detenerse un rato solo para nosotros.</p>

        <p>Y si pudiera, compraría todo el tiempo necesario para quedarme ahí, contigo, haciendo que ese instante jamás desaparezca de mí.</p>
    `
},
            "6324": {

            "0357": {

            "1717": {
    date: "28 Mayo 2026",
    title: "Mi cielo",
    text: `
        <p>Últimamente he estado bastante feliz,<br>
        y supongo que tú tienes mucho que ver con eso.</p>

        <p>No sé en qué momento empezaste a volver mis días más ligeros,<br>
        y, sinceramente, me gusta demasiado que sea así.</p>

        <p>A veces pienso en todo lo que tuvo que pasar para que usted y yo coincidiéramos,<br>
        en todas las casualidades absurdamente precisas que tuvieron que alinearse,<br>
        y entonces entiendo que el universo hizo demasiado esfuerzo como para que yo no intente hacerte feliz de verdad.</p>

        <p>Por eso quiero que valga la pena.<br>
        Todo.<br>
        La distancia, la espera, los nervios, las ganas de verte,<br>
        y cada pequeña cosa que nos ha traído hasta aquí.</p>

        <p>Sé que todavía no te he dado ni la mitad de lo que mereces,<br>
        pero te prometo darte todo, absolutamente todo, de lo poco que tengo.<br>
        Porque quizá no soy perfecto,<br>
        pero contigo las intenciones me nacen bonitas y sinceras.</p>

        <p>Y gracias...<br>
        gracias por la confianza,<br>
        por abrirme espacio en tu vida,<br>
        por permitirme conocerte un poquito más cada día<br>
        y también por dejar que conozcas la parte más real de mí.</p>

        <p>Solo espero que algún día mires todo esto hacia atrás<br>
        y entiendas que jamás tuve intención de jugar contigo,<br>
        porque desde el principio lo único que he querido<br>
        es hacerte sentir querida, tranquila y especial.</p>

        <p>Y créeme,<br>
        jamás vas a arrepentirte de haberme conocido, mi cielo.</p>
    `
},
            "3634": {
    date: "29 Mayo 2026",
    title: "Tú eres una de ellas",
    text: `
        <p>La vida, en estos momentos, me está dando bastante duro.<br>
        No voy a mentirte, últimamente no la he estado pasando bien conmigo mismo y hay días en los que seguir adelante me cuesta más de lo que quisiera admitir.</p>

        <p>Pero si hay algo que no ha cambiado en medio de todo este desorden, eres tú.</p>

        <p>De hecho, si soy sincero, te estoy queriendo como nunca, mi preciosa.</p>

        <p>Y tal vez no lo sepas, pero te has ido convirtiendo en una de las partes más bonitas de mis días. Cuando todo parece ir cuesta arriba, cuando mi cabeza decide hacerme las cosas más difíciles de lo necesario, apareces tú de alguna manera y consigues que el peso sea un poco más llevadero.</p>

        <p>No porque vengas a resolver mis problemas, ni porque tengas la responsabilidad de hacerlo, sino porque tu existencia en mi vida me recuerda que todavía hay cosas que valen la pena, cosas que me hacen sonreír incluso en los días más grises.</p>

        <p>Por eso te pido paciencia si a veces me notas cansado o distante.<br>
        No es falta de interés, no es que mis sentimientos hayan cambiado ni un poco.</p>

        <p>Al contrario.</p>

        <p>Aun en medio de estos días complicados, sigo teniendo las mismas ganas de conocerte más, de cuidarte, de hacerte reír y de construir algo bonito contigo.</p>

        <p>Y no dudes ni por un segundo que sigo conservando la misma intensidad, la misma ilusión y los mismos deseos de algún día poder llamarte mi mujer.</p>

        <p>Porque hay cosas que cambian con los días,<br>
        y hay otras que, mientras más tiempo pasa, más seguras se vuelven.</p>

        <p>Tú eres una de ellas.</p>
    `
},
            "2580": {
    date: "30 Mayo 2026",
    title: "Quiero compartir contigo",
    text: `
        <p>Puede que esto no sea una sorpresa para ti, pero siento que ya es hora de ponerle nombre a lo que llevo tiempo sintiendo, de dejar de insinuarlo y decirlo con todas sus letras. Porque hay sentimientos que merecen ser pronunciados, y este es uno de ellos.</p>

        <p>Quiero compartir la vida contigo.</p>

        <p>Y no me refiero únicamente a los momentos bonitos, a las conversaciones que nos hacen sonreír o a los días en los que todo parece sencillo. También hablo de los días difíciles, de esos momentos en los que el cansancio pesa, cuando los planes cambian, cuando la distancia incomoda o cuando la vida nos pone a prueba.</p>

        <p>Quiero seguir descubriéndote con el paso del tiempo, aprender tus nuevas versiones, escuchar tus pensamientos cuando nadie más los conoce y estar presente tanto en tus mejores recuerdos como en esos instantes silenciosos que terminan significando más de lo que parecen.</p>

        <p>Quiero convertirme en alguien en quien puedas apoyarte, alguien que te inspire seguridad, que celebre tus alegrías como si fueran propias y que permanezca cerca cuando necesites compañía.</p>

        <p>Quiero ser parte de tus días, de las pequeñas rutinas que construyen una vida, de las historias que todavía no hemos vivido y de los sueños que aún están esperando su momento.</p>

        <p>Quiero acompañarte cuando las cosas salgan bien y quedarme cuando no salgan como esperábamos. Quiero admirarte en tus fortalezas y cuidarte en tus momentos de fragilidad. Quiero que el tiempo nos encuentre caminando en la misma dirección.</p>

        <p>Porque mientras más te conozco, más claro tengo que no me interesa una historia pasajera ni una emoción momentánea. Lo que quiero es seguir apostando por ti, seguir eligiéndote y seguir construyendo algo contigo.</p>

        <p>Y si tengo que resumir todo lo que siento en una sola idea, sería esta: de todas las personas que podría elegir, la persona con la que quiero compartir la vida eres tú.</p>
    `
},
            "1346": {
    date: "31 Mayo 2026",
    title: "Lo especial siempre has sido tú",
    text: `
        <p>Hoy me senté a escribirte como siempre. Tomé una hoja y me encontré frente a ese mar blanco que tienen las páginas antes de recibir la primera palabra.</p>

        <p>Normalmente las frases llegan solas, pero esta vez no. Me quedé observando el papel vacío, que parecía estar haciéndome preguntas en lugar de esperar respuestas.</p>

        <p>No porque no estuviera pensando en ti. De hecho, probablemente pienso demasiado en ti. El problema fue otro. Por primera vez en mucho tiempo me pregunté si todo esto sigue siendo tan especial para ti como lo es para mí.</p>

        <p>Y supongo que la culpa la tiene una sola palabra.</p>

        <p>"Oración".</p>

        <p>No sé por qué, pero cuando la escuché, mi cabeza empezó a darle vueltas por todos lados. La asocié con algo repetitivo, con algo que se dice tantas veces que termina perdiendo fuerza, como una rutina que deja de sorprender.</p>

        <p>Sé que probablemente no era eso lo que querías decir. Estoy seguro de que no había ninguna mala intención detrás de esa palabra. Pero ya me conoces, a veces una sola frase es suficiente para quedarse rondando en mi cabeza mucho más tiempo del que debería.</p>

        <p>Porque yo no escribo esto por costumbre. No escribo porque sí. No escribo para llenar una página. Escribo porque durante el día pasan cosas que me hacen pensar en ti y necesito dejarlas en algún lugar.</p>

        <p>Como cuando veo algo gracioso y mi primer pensamiento es: "esto se lo tengo que mostrar". O cuando escucho una canción y me pregunto si te gustaría o si me dirías que tengo gustos cuestionables. O cuando imagino algo tan simple como estar sentados en una cafetería cualquiera, discutiendo sobre algo sin importancia mientras tú intentas convencerme de que tienes razón y yo finjo no estar de acuerdo solo para hacerte rabiar.</p>

        <p>Son escenas pequeñas. Ni siquiera han ocurrido. Pero aparecen en mi cabeza con una facilidad que a veces me sorprende.</p>

        <p>Y quizá por eso me preocupó tanto aquella palabra. Porque para mí estos escritos siguen siendo especiales. No por lo que dicen, sino por quién los inspira. Porque detrás de cada uno siempre has estado tú. Tus mensajes, tus ocurrencias, tu forma de aparecer en mis días incluso cuando estás a miles de kilómetros.</p>

        <p>Y si algún día esto deja de ser especial para ti, si algún día mis palabras dejan de emocionarte, de hacerte sonreír o simplemente dejan de significar algo, solo te pido una cosa: dímelo.</p>

        <p>Dímelo con la misma sinceridad con la que yo intento escribirte cada noche. No me prometas que nunca va a pasar. Solo prométeme que, si pasa, no me dejarás adivinarlo.</p>

        <p>Mientras tanto, yo voy a seguir aquí, escribiendo lo que me nazca, pensando en ti más de lo razonable y guardando todas esas pequeñas escenas que todavía espero vivir contigo algún día.</p>

        <p>Porque, al final, lo especial nunca ha sido la página. Lo especial siempre has sido tú.</p>
    `
},
            "4679": {
    date: "1 Junio 2026",
    title: "Lo bonito que es quererte",
    text: `
        <p>Lo bonito que es quererte aun sin poderte dar un abrazo.</p>

        <p>Sin poder sentarme a tu lado y olvidarme del tiempo contigo.</p>

        <p>Lo bonito que es quererte incluso cuando la distancia se interpone.</p>

        <p>Lo bonito que es descubrir que hay personas que valen la pena.</p>

            "9510": {
    date: "2 Junio 2026",
    title: "El primer mes",
    text: `
        <p>Este es el primer mes.</p>

        <p>El primer mes escribiéndote. El primer mes sentándome cada día a buscar la manera de convertir en palabras todo lo que me haces sentir. El primer mes intentando, aunque sea por un momento, hacerte entender lo mucho que me importas y lo mucho que te quiero en mi vida.</p>

        <p>También es el primer mes descubriendo lo difícil que es escribir sobre ti. Porque mientras más te conozco, más me doy cuenta de que ninguna página parece suficiente. Y creo que ni en toda una vida existirían las palabras necesarias para plasmar por completo todo lo que quisiera decirte.</p>

        <p>Ha sido el primer mes tratando de demostrarte que la distancia puede ser un obstáculo, pero nunca un impedimento. Que aunque no pueda tomarte de la mano, acompañarte a casa o sentarme contigo a tomar un café, todavía puedo encontrarte cada noche entre estas líneas y dedicarte algo que para mí tiene mucho valor: mi tiempo, mis pensamientos y mis letras.</p>

        <p>Treinta días pueden parecer poco tiempo. Sin embargo, para mí han sido treinta oportunidades de recordarte que estás presente en mi vida, treinta intentos de sacarte una sonrisa, treinta noches eligiendo escribirte antes de dormir porque, de alguna manera, ya te convertiste en parte de mis días.</p>

        <p>Y este es apenas el primer mes.</p>

        <p>El primero de muchos escritos, de muchas páginas y de muchas cosas que todavía quiero contarte.</p>

        <p>Porque si algo tengo claro después de estos treinta días, es que todavía me quedan demasiadas palabras por dedicarte.</p>
    `
},
            "3928": {
    date: "3 Junio 2026",
    title: "Los días normales contigo",
    text: `
        <p>Hoy me imaginé mostrándote una canción que me gusta.</p>

        <p>Y no la canción en sí, sino el momento.</p>

        <p>Me imaginé intentando explicarte por qué me parece tan buena, hablando más de la cuenta y tratando de convencerte de que cierta parte es increíble.</p>

        <p>Y también me imaginé a ti escuchándome, dejándome terminar para después decirme que estoy exagerando.</p>

        <p>Porque, siendo honestos, probablemente tendrías razón.</p>

        <p>Lo que más me hizo sonreír fue darme cuenta de que ya no solo pienso en verte.</p>

        <p>También pienso en todas esas pequeñas cosas que podríamos hacer juntos.</p>

        <p>Escuchar música, hablar de cualquier tema durante horas, discutir por tonterías sin importancia o reírnos de cosas que nadie más entendería.</p>

        <p>Son momentos simples, pero últimamente son los que más me gusta imaginar.</p>

        <p>Porque mientras más te conozco, más me doy cuenta de que no solo me ilusionan los grandes planes contigo.</p>

        <p>También me ilusionan esos días normales que dejan de ser normales cuando se comparten con la persona correcta.</p>

        <p>Y, por alguna razón, cada vez que imagino esos momentos, siempre apareces tú.</p>
    `
},
            "1739": {
    date: "4 Junio 2026",
    title: "Cuando llegue el momento",
    text: `
        <p>Si algún día sientes miedo de mostrarme las partes más frágiles de ti, espero que recuerdes esto. No tienes que esconderme lo que te ha dolido ni disfrazar las cicatrices para que se vean más bonitas. No quiero conocerte únicamente en tus días buenos, ni quedarme solo con la versión de ti que le muestras al mundo cuando todo está bien. También quiero conocer aquello que te cuesta explicar, las historias que todavía pesan, los recuerdos que prefieres evitar y las inseguridades que aparecen cuando nadie te está viendo.</p>

        <p>No porque quiera arreglarlas, ni porque crea que tengo la solución para algo que lleva años dentro de ti. Simplemente porque si me importas, entonces también me importa todo aquello que te convirtió en la mujer que eres hoy.</p>

        <p>Y quiero que entiendas algo: no vas a espantarme por ser humana. No voy a salir corriendo porque tengas heridas, dudas o miedos. De hecho, si algún día decides confiarme esas partes de ti, lo único que voy a hacer es escucharte. Escucharte las veces que haga falta, aunque me cuentes la misma historia una y otra vez, aunque ya conozca cada detalle de memoria. Porque hay cosas que no necesitan consejos, necesitan compañía.</p>

        <p>Así que cuando te sientas lista, cuéntame. No para invadir esos lugares sensibles, sino para aprender a cuidarlos. Porque cuando alguien es importante para ti, también lo son las cosas que le duelen.</p>

        <p>Y quizá eso es lo que más extraño me parece de estos tiempos. Que muchas personas tienen miedo de quedarse, miedo de sentir, miedo de intentarlo, como si querer de verdad se hubiera vuelto una mala idea.</p>

        <p>Por eso solo quiero pedirte una cosa: cuando llegue el momento, no seas como todos. Déjame demostrarte que todavía existen personas que no salen corriendo cuando la historia se pone difícil.</p>
    `
},
            "3719": {
    date: "5 Junio 2026",
    title: "Para ti",
    text: `
        <p>Para tus dudas, tiempo.<br>Para tus miedos, calma.<br>Para tus silencios, comprensión.<br>Para tu incertidumbre, constancia.<br>Para tus cicatrices, ternura.<br>Para los días difíciles, compañía.<br>Para las noches largas, paciencia.<br>Para tus tropiezos, una mano.<br>Para tus lágrimas, un abrazo.<br>Para tus heridas, cariño.<br>Para ti, todo lo que tengo.<br>Y lo que no tenga, lo aprendo.<br>Lo que no sepa, lo descubro.<br>Y lo que me falte, por ti lo consigo.</p>
    `
},
            "4544": {
    date: "6 Junio 2026",
    title: "Today it rained",
    text: `
        <p>Today it rained.</p>

        <p>It's been raining all afternoon, and it will probably keep raining all night.</p>

        <p>And as I watch the raindrops fall, I can't help but think of you.</p>

        <p>I picture your hair soaked from the rain, the look on your face when the cold hits you, the hug I'd pull you into just to warm you up, and the two of us walking slowly under the same umbrella, taking our time, talking about nothing in particular.</p>

        <p>It's funny how something as simple as rain can fill your mind with so many moments that haven't happened yet.</p>

        <p>Every drop feels like a memory from a life we haven't lived yet.</p>

        <p>And when I look at the puddles reflecting the lights of the night, it feels like they're reflecting a little of everything I imagine for us too—those small moments that are still waiting for their turn, the ones I hope someday I'll stop imagining and start remembering.</p>

        <p>It's going to be cold tonight.</p>

        <p>I know because you can already feel it in the air.</p>

        <p>And out of everything that could be on my mind, I keep coming back to one thought: the moment when it won't matter how cold it is outside because we'll be under the same blanket, laughing at something silly and quietly grateful that we made it to that moment together.</p>
    `
},
            "5887": {
    date: "7 Junio 2026",
    title: "Siempre apareces tú",
    text: `
        <p>Hay días en los que siento que estoy intentando sostener demasiadas cosas al mismo tiempo.<br><br>Responsabilidades, preocupaciones, pendientes, pensamientos que no siempre sé cómo ordenar. Y aunque hago lo posible por mantener todo en equilibrio, a veces no me alcanza la energía para estar presente de la manera en que me gustaría.<br><br>Por eso, si alguna vez me notas más callado, más cansado o menos atento de lo normal, no quiero que lo confundas con falta de interés.<br><br>La verdad es que, incluso en los días en los que apenas puedo conmigo, sigo encontrando espacio para ti.<br><br>Quizá no siempre te dé la mejor versión de mí. Y es algo que no me gusta saber. Quizá algunas veces me encuentres agotado, distraído o con más peso del que quisiera cargar. Pero aun así, siempre voy a estar.<br><br>Porque hay personas que hacen más llevaderos los días buenos, y también le dan sentido a los difíciles. Tú eres ambas cosas.<br><br>No tengo excusas para los momentos en los que me quede corto. Tampoco voy a pedirte que ignores mis errores o mis ausencias cuando ocurran. Solo espero que, cuando eso pase, también puedas ver el esfuerzo que hay detrás.<br><br>Porque aunque últimamente la vida me haya exigido más de lo habitual, sigo avanzando en la misma dirección.<br><br>Y en esa dirección, de una forma u otra, siempre apareces tú.<br><br>No porque seas una meta que alcanzar, sino porque te has convertido en alguien a quien no quiero dejar de elegir.</p>
    `
},
            "9798": {
    date: "8 Junio 2026",
    title: "Siempre voy a querer escuchar más",
    text: `
        <p>Nada es aburrido si me lo cuentas tú.<br><br>Nada suena extraño cuando sale de tu boca. De alguna forma, todo tiene sentido cuando eres tú quien lo dice. Podrías hablarme de la cosa más simple del mundo y aun así me quedarían ganas de seguir escuchándote.<br><br>Y no es por lo que cuentas, es por ti. Porque mientras hablas, mis ojos brillan de una manera que ojalá pudieras ver algún día. Tal vez así entenderías hasta dónde llegan tus palabras, todo lo que provocan en mí y la atención con la que escucho cada cosa que decides compartir.<br><br>Por eso nunca pienses que me estás contando demasiado, ni que algo de tu vida no merece ser dicho. Cuéntame lo importante, lo complicado, lo emocionante y también lo cotidiano. Cuéntame las historias que ya has contado antes y las que todavía no le has contado a nadie.<br><br>Cuéntame cómo estuvo tu día, qué te hizo reír, qué te hizo pensar y hasta qué fue eso que te molestó por cinco minutos y después olvidaste. Porque todo lo que tiene que ver contigo me interesa.<br><br>Y porque una de mis cosas favoritas es sentir que, poco a poco, me vas dejando entrar en tu vida.<br><br>Así que no dejes de contarme cosas. No dejes de hacerme parte de tus días. Porque mientras se trate de ti, siempre voy a querer escuchar más.</p>
    `
},
            "5654": {
    date: "9 Junio 2026",
    title: "Sigue adelante, mi cielo",
    text: `
        <p>Sigue adelante, mi cielo.<br><br>Sé que llevas varios días cargando más de la cuenta, que el cansancio se acumula, que el estrés pesa y que el sueño ya te está pasando factura. Pero no olvides que los días difíciles también terminan pasando, aunque cuando estás en medio de ellos parezca que no.<br><br>Date un respiro cuando lo necesites, tómate las cosas una a una y no te exijas resolverlo todo de golpe.<br><br>Y si hoy se te escapa recordarlo, entonces déjame hacerlo por ti: yo confío muchísimo en ti.<br><br>Porque veo todo lo que haces, incluso lo que nadie nota. Veo las veces que sigues adelante aunque estés agotada, las veces que te levantas cuando sería más fácil quedarte quieta, y la fuerza que tienes incluso cuando dudas de ella.<br><br>Así que aguanta un poquito más, preciosa.<br><br>Yo sé de lo que eres capaz.<br><br>Y si hoy no encuentras motivos para creer en ti, te presto los míos hasta que vuelvas a encontrarlos.</p>
    `
},
            "3334": {
    date: "10 Junio 2026",
    title: "Perdámonos en el tiempo",
    text: `
        <p>Contigo no tengo por qué perder el tiempo.<br>
        Mejor perdámonos los dos en él.</p>

        <p>Dejemos que las horas hagan lo que quieran mientras hablamos de cualquier cosa, mientras nos distraemos el uno al otro o mientras convertimos unos cuantos minutos en algo que termina durando toda la noche.</p>

        <p>Porque hay personas con las que el tiempo pesa, y hay otras con las que simplemente pasa.</p>

        <p>Por eso no quiero correr cuando estoy contigo.</p>

        <p>Prefiero perder la noción de la hora, alargar las conversaciones un poco más de la cuenta y quedarme donde sea que estés tú.</p>

        <p>Contigo no quiero contar los minutos.<br>
        Quiero que se me olviden.</p>

        <p>Y que ninguno de los dos tenga prisa por volver a encontrarlos.</p>
    `
},
            "9658": {
    date: "11 Junio 2026",
    title: "Todavía me sorprendes",
    text: `
        <p>Me gusta que todavía me sorprendas.</p>

        <p>Y no hablo de grandes cosas. Hablo de esos momentos en los que dices algo que no esperaba, cuentas una historia que nunca había escuchado o me muestras una parte de ti que no conocía.</p>

        <p>Es extraño. Mientras más te conozco, más me doy cuenta de todo lo que me falta por descubrir.</p>

        <p>Y, por alguna razón, eso me gusta mucho.</p>
    `
},
            "1164": {
    date: "12 Junio 2026",
    title: "Coincidencias",
    text: `
        <p>La mayoría de las personas que existen jamás llegarán a conocerse.</p>

        <p>Nacen en ciudades distintas, crecen siguiendo caminos diferentes y viven sus vidas sin siquiera sospechar que la otra persona existe. A veces pienso en todas esas historias que nunca empiezan, en todas esas conversaciones que nunca ocurren y en todos esos encuentros que se quedan a una casualidad de distancia.</p>

        <p>Y quién sabe cuántos de ellos habrían sido importantes. Tal vez por la forma de pensar, por una conexión difícil de explicar, por una coincidencia de esas que parecen insignificantes al principio o por algo tan simple como sentirse cómodo al lado de alguien.</p>

        <p>Pero nunca lo sabrán. Ni ellos ni nosotros.</p>

        <p>Porque muchas veces basta con llegar un minuto antes, un minuto después, tomar otra calle o mirar hacia otro lado para que dos vidas sigan avanzando en paralelo sin tocarse jamás.</p>

        <p>Por eso los encuentros tienen algo de extraordinario. No porque estén escritos en algún lugar, sino porque son improbables. Porque entre millones de posibilidades, dos personas terminan compartiendo el mismo momento, el mismo espacio y, a veces, la misma historia.</p>

        <p>Y cuando lo pienso de esa manera, me cuesta creer que haya algo ordinario en encontrarte.</p>

        <p>Porque hay coincidencias que pasan desapercibidas. Y hay otras que terminan cambiándolo todo.</p>
    `
},
            "7357": {
    date: "13 Junio 2026",
    title: "Poco a poco",
    text: `
        <p>No espero que me entregues toda tu confianza de una vez.</p>

        <p>Las cosas que valen la pena suelen tomarse su tiempo, y prefiero ganarme la tuya poco a poco antes que recibirla sin merecerla.</p>

        <p>Solo quiero que con el tiempo veas quién soy cuando se trata de ti.</p>

        <p>Que notes el interés detrás de cada conversación, la atención que pongo en los detalles y las ganas sinceras que tengo de aportarle algo bueno a tus días.</p>

        <p>Quiero ser alguien que te saque una sonrisa cuando la necesites, alguien que te acompañe cuando las cosas no estén saliendo bien y alguien que celebre contigo cada avance, por pequeño que parezca.</p>

        <p>Quiero que sepas que puedes buscarme a cualquier hora y encontrarme dispuesto a escucharte.</p>

        <p>Y, sobre todo, quiero que nunca tengas que preguntarte cuánto vales.</p>

        <p>Porque mereces más de lo que imaginas, y ojalá algún día lo veas con la misma claridad con la que lo veo yo.</p>
    `
},

            "7547": {
    date: "15 Junio 2026",
    title: "Una bachata contigo",
    text: `
        <p>Tengo una teoría.</p>

        <p>Creo que algún día vamos a bailar una bachata juntos y ninguno de los dos va a estar pensando en los pasos. Porque al final nunca se ha tratado de eso.</p>

        <p>No se trata de hacerlo perfecto. Se trata de reírnos cuando uno se equivoque, de volver a empezar cuando perdamos el ritmo y de descubrir que algunas cosas salen mejor cuando dejas de intentar controlarlas.</p>

        <p>Quizá me pises una vez. Quizá sea yo quien se equivoque primero. Pero sospecho que terminaremos riéndonos más de lo que bailaremos. Y, siendo sincero, creo que eso me gustaría todavía más.</p>

        <p>Porque hay personas con las que compartes una canción y hay otras con las que una canción termina convirtiéndose en un recuerdo.</p>

        <p>A mí me basta con que cuando esa bachata termine, ninguno de los dos tenga ganas de que termine el momento.</p>
    `
            },
            "4354": {
    date: "16 Junio 2026",
    title: "Nuestra primera discusión",
    text: `
        <p>Ayer fue nuestra primera discusión.</p>

        <p>Y, aunque suene extraño, me gustó mucho. Me puse contento y hasta terminé riéndome.</p>

        <p>Al final, nunca vamos a estar exentos de esas cosas. Somos dos personas diferentes, con formas distintas de pensar, de sentir y de reaccionar. Además, conmigo vas a tener trabajo, porque tengo la mala costumbre de comprar problemas donde a veces ni los hay, así que sospecho que esto no será la última vez.</p>

        <p>Pero si algo me gustó de ayer fue la manera en que afrontamos las cosas. No nos alejamos. No dejamos que el orgullo hablara por nosotros. Hablamos, nos escuchamos, intentamos entendernos y hasta encontramos espacio para reírnos aun estando molestos.</p>

        <p>Y creo que ahí está lo importante. No en evitar las diferencias, sino en cómo decidimos atravesarlas.</p>

        <p>Yo siempre voy a tener paciencia para ella y por ella. Siempre voy a respetarla. No voy a levantarle la voz ni voy a intentar ganar una discusión a costa de sus sentimientos.</p>

        <p>Prefiero sentarme, hablarlo, entenderla y, si la situación lo permite, terminar riéndome. No de ella, sino de nosotros y de lo humanas que pueden ser estas cosas.</p>

        <p>Porque si algo me dejó ayer, fue la tranquilidad de saber que incluso cuando no estamos de acuerdo, seguimos estando del mismo lado.</p>

        <p>Por esta y por muchas discusiones más.</p>
    `
            },
            "6458": {
    date: "17 Junio 2026",
    title: "Pensé en contártelo",
    text: `
        <p>Hay algo que me causa gracia.</p>

        <p>Y es que ya no puedo escuchar ciertas cosas sin pensar inmediatamente en contártelas. Me pasa con videos, con canciones, con historias que me encuentro por ahí e incluso con cosas completamente aleatorias que probablemente a nadie más le importarían.</p>

        <p>Y no es porque necesite contarte todo. Es porque me gusta imaginar tu reacción. Me gusta preguntarme qué pensarías, si te daría risa, si estarías de acuerdo o si terminaríamos discutiendo por una tontería durante media hora.</p>

        <p>A veces ni siquiera alcanzo a enviarte algo y ya tuve toda la conversación en mi cabeza.</p>

        <p>Y supongo que es una señal bastante clara de lo presente que estás en mis días. Porque antes las cosas simplemente me pasaban. Ahora también me pregunto qué dirías tú sobre ellas.</p>

        <p>Y, para ser sincero, eso ha hecho los días mucho más entretenidos.</p>
    `
},
            "9636": {
    date: "18 Junio 2026",
    title: "Carta de negocios",
    text: `
        <p>Sabes, estaba yo pensando hace ratito que tú eres como el cielo… Bueno, pero esto no es una carta de amor, es una carta de negocios.</p>

        <p>Estoy tratando de resolver nuestro negocio, el tuyo y el mío, para que los dos tengamos algo que ganar, yo más que tú, porque yo te gano a ti, y tú, en cambio, solo lograrás obtener a este muchacho desorientado y enfermo; no tan desorientado que digamos, pero sí muy enfermo de amor por ti.</p>

        <p>— Juan Rulfo</p>
    `
},
            "7544": {
    date: "19 Junio 2026",
    title: "Tu forma de ser",
    text: `
        <p>Hay algo de ti que me gusta mucho y que probablemente no te digo lo suficiente.</p>

        <p>Tu forma de ser.</p>

        <p>Y no me refiero a una versión idealizada de ti, como tú piensas, ni a las cosas bonitas que cualquiera puede notar a simple vista. Me refiero a esos detalles que solo aparecen mientras más te conozco, a esas cosas que van más allá de una foto o las que no se descubren en una conversación cualquiera.</p>

        <p>La manera en que reaccionas a ciertas cosas. Las opiniones que tienes. Las cosas que te importan. La forma en que te expresas cuando algo te emociona, cuando algo te molesta o cuando estás convencida de algo. Son detalles pequeños, pero son precisamente esos detalles los que terminan diciendo más de una persona.</p>

        <p>Porque mientras más te conozco, más me doy cuenta de que eres una persona muy tuya. No siento que intentes parecerte a nadie. No siento que cambies tu forma de ser para encajar. Y hoy en día eso es algo que no se encuentra, por eso te admiro mucho.</p>

        <p>Hay gente que pasa la vida entera tratando de cumplir expectativas ajenas, adaptándose a lo que otros quieren ver o escuchar. Tú, en cambio, tienes una forma muy auténtica de estar en el mundo. Te equivocas, aciertas, opinas, te ríes, te molestas y haces las cosas a tu manera. Y aunque parezca algo normal, no lo es tanto.</p>

        <p>Y puede que no te des cuenta, pero eso se nota. Se nota en las pequeñas cosas.<br>
        En la manera en que cuentas una historia.<br>
        En las cosas que eliges compartir.<br>
        En la forma en que ves el mundo.<br>
        Incluso en las cosas con las que no estás de acuerdo.</p>

        <p>Creo que una de las razones por las que disfruto tanto conocerte es precisamente esa. Que nunca siento que estoy hablando con una copia de alguien más. Nunca siento que estoy escuchando respuestas preparadas o intentando descifrar quién quiere ser la otra persona.</p>

        <p>Siempre siento que estoy hablando contigo.</p>

        <p>Y eso me gusta mucho porque significa que todavía hay cosas por descubrir. Que todavía hay historias que no me has contado, opiniones que no conozco, experiencias que no me has compartido y partes de ti que siguen siendo nuevas para mí.</p>

        <p>Y la verdad, eso hace que conocerte siga siendo interesante.</p>

        <p>Porque mientras más aprendo sobre ti, más razones encuentro para seguir prestando atención.</p>

        <p>Y eso, aunque parezca algo simple, es muchísimo más especial de lo que la mayoría de las personas imagina.</p>
    `
},
            "1240": {
    date: "20 Junio 2026",
    title: "Si recibiste mis flores",
    text: `
        <p>Mujer, si recibiste mis flores y mi carta, ponlas sobre la mesa.</p>

        <p>Y después ve corriendo a contarle a todo el mundo.</p>

        <p>Diles que hay un hombre que perdió la compostura contigo.</p>

        <p>Que le falta más de un tornillo.</p>

        <p>Que se cree poeta desde que apareciste.</p>

        <p>Que escribe más de la cuenta, que te piensa más de lo recomendable y que, a estas alturas, ya no está haciendo nada por ocultarlo.</p>

        <p>Cuéntales que existe un loco que encontró la manera de convertirte en tema de conversación, en pensamiento recurrente y en la inspiración de demasiadas palabras.</p>

        <p>Y si alguien te pregunta qué fue lo que me pasó, diles la verdad.</p>

        <p>Que tuve la mala suerte de enfermarme.</p>

        <p>Y la mejor suerte de que fuera de cariño por ti.</p>
    `
},
            "7147": {
    date: "21 Junio 2026",
    title: "El primero de muchos",
    text: `
        <p>Ayer fue la primera vez que me dijiste “te amo”. No sabes la tranquilidad… la felicidad… y el desorden bonito de emociones en el que me quedé en ese momento. Tal vez para el mundo no fue nada. Tal vez no pasó nada importante en el planeta, nadie lo celebró, nadie lo anotó en la historia, nadie lo va a recordar como un evento relevante. Pero para mí sí fue algo enorme.</p>

        <p>De hecho, creo que es de esos momentos que no necesitan testigos para ser importantes. De esos que no hacen ruido afuera, pero adentro te cambian el volumen de todo. Porque esas palabras me llenaron más de lo que muchas cosas en la vida han logrado llenarme. Y no lo digo de forma exagerada, lo digo con esa extraña calma que se siente cuando algo simplemente encaja.</p>

        <p>Escucharlas salir de tu boca fue… raro en el mejor sentido. Como si una parte de mí que llevaba mucho tiempo en silencio por fin hubiera recibido algo que estaba esperando sin saberlo. Y sí, suena cursi si lo digo así. Pero es que hay cosas que no se pueden vestir bonito sin que pierdan verdad.</p>

        <p>Fue como si el mundo siguiera normal, la gente siguiera con su vida, los problemas siguieran existiendo… pero dentro de mí se hubiera hecho una pausa breve, solo para entender lo que acababa de pasar. Y lo más curioso es que uno se imagina ese tipo de momentos como algo gigantesco, con fuegos artificiales emocionales, música de fondo, cámara lenta y toda esa exageración romántica que uno ve en películas. Pero no.</p>

        <p>Fue algo simple. Y tal vez por eso pegó más fuerte. Porque a veces lo más importante no llega con drama… llega en voz baja, como si no quisiera asustarte.</p>

        <p>Supongo que es irónico. Uno pasa la vida esperando grandes señales, grandes gestos, grandes momentos… y al final termina quedándose con una frase dicha en un instante normal, que de normal no tuvo absolutamente nada.</p>

        <p>Y aquí estoy, dándome cuenta de que hay palabras que no se escuchan con los oídos, sino con algo más interno, algo que no sé ni cómo explicar sin que suene exagerado.</p>

        <p>Pero bueno… Si el resto del mundo se pierde ese tipo de cosas, allá ellos. Yo por mi parte me quedo con esto. Con ese “te amo” porque yo también TE AMO</p>
    `
},
            "9648": {
    date: "22 Junio 2026",
    title: "Quiero este viaje contigo",
    text: `
        <p>Quiero este viaje contigo.</p>

        <p>Y la verdad es que últimamente no pienso en mucho más que eso.</p>

        <p>Quiero organizarlo todo, cuadrarlo todo, dejar cada detalle listo y empezar a tachar pendientes uno por uno hasta que lo único que quede sea el momento de verte llegar.</p>

        <p>Porque no se trata solamente de un viaje. Se trata de ti.</p>

        <p>Se trata de tener algo fijo a lo que aferrarme cuando los días se hacen largos. De poder mirar una fecha en el calendario y saber que cada día que pasa me acerca un poco más a ti. De dejar de imaginar tanto y empezar a contar el tiempo que falta para volver a verte.</p>

        <p>Y no sabes la tranquilidad que me da pensar en eso.</p>

        <p>La tranquilidad de saber que existe un próximo abrazo esperándome. Que existe una próxima conversación frente a frente. Que existe un próximo momento en el que no habrá pantallas, ni llamadas, ni kilómetros de por medio.</p>

        <p>Solo nosotros.</p>

        <p>Porque por más que me guste hablar contigo, escucharte y compartir mis días contigo, hay una parte de mí que se está muriendo por volver a tenerte entre mis brazos.</p>

        <p>Por comprobar que eres real y no solamente la persona que aparece en mi pantalla todos los días. Por abrazarte el tiempo suficiente para compensar toda esta distancia absurda. Por sentir esa paz que aparece cuando la persona que extrañas deja de ser una idea y vuelve a convertirse en una presencia.</p>

        <p>Porque cuando paso tanto tiempo pensando en alguien, cuando esa persona ocupa tantos espacios de mis días, supongo que es normal que llegue un punto en el que ya no quiera imaginar más momentos contigo.</p>

        <p>Quiero vivirlos.</p>

        <p>Quiero dejar de preguntarme cómo se sentiría tenerte cerca.</p>

        <p>Quiero averiguarlo.</p>

        <p>Y por eso quiero este viaje contigo es más de lo que probablemente alcanzas a imaginar.</p>
    `
},
            "9898": {
date: "23 Junio 2026",
title: "The Strange Door",
text: ` 
<p>Once upon a time, there was a strange door.</p>

    <p>It didn't appear in castles or magical places. It had no glowing lights and no secrets carved into its surface.</p>

    <p>It appeared on an ordinary night, right in front of me, in the middle of an ordinary day.</p>

    <p>And the strangest thing about it was that it didn't lead to the past.</p>

    <p>It didn't lead to distant places either.</p>

    <p>It led to the future.</p>

    <p>But it came with one condition.</p>

    <p>It wouldn't show great events.</p>

    <p>No weddings.</p>

    <p>No anniversaries.</p>

    <p>No entire years unfolding before your eyes.</p>

    <p>It only allowed you to see small moments.</p>

    <p>Insignificant moments.</p>

    <p>Or at least, that's what they seemed to be.</p>

    <p>The first time I looked through it, I thought it was broken.</p>

    <p>Because all I saw was a woman sitting on a couch.</p>

    <p>Nothing more.</p>

    <p>No epic music.</p>

    <p>No fireworks.</p>

    <p>No breathtaking scene.</p>

    <p>Just a woman pulling a blanket over herself while arguing with me about a movie.</p>

    <p>And I remember thinking:</p>

    <p>"That's it?"</p>

    <p>So I closed the door.</p>

    <p>Then I opened it again.</p>

    <p>And another moment appeared.</p>

    <p>We were walking down some random street.</p>

    <p>I don't even remember where.</p>

    <p>You were talking about something that excited you, and I was pretending I completely understood the subject.</p>

    <p>And when you finally finished explaining it, I said something so ridiculously stupid that you rolled your eyes at me.</p>

    <p>Then you laughed.</p>

    <p>And the door closed once again.</p>

    <p>The third time, it showed me something even stranger.</p>

    <p>You were cooking.</p>

    <p>I was getting in the way.</p>

    <p>And somehow we seemed to be arguing about something completely ridiculous.</p>

    <p>I don't remember who was right.</p>
